# cargo-audit configuration
#
# Mirrors the ignore list in /deny.toml so `cargo audit` and `cargo deny
# check` agree. See /deny.toml for the per-advisory justification and
# /docs/dependency-tracking.md for the upstream-blocker status.

[advisories]
ignore = [
    # GTK3 binding chain — upstream-blocked on wry GTK4 migration
    # (https://github.com/tauri-apps/wry/issues/1474). Linux desktop
    # build target only; macOS/Windows are unaffected.
    "RUSTSEC-2024-0411", # gdkwayland-sys (unmaintained)
    "RUSTSEC-2024-0412", # gdk (unmaintained)
    "RUSTSEC-2024-0413", # atk (unmaintained)
    "RUSTSEC-2024-0414", # gdkx11-sys (unmaintained)
    "RUSTSEC-2024-0415", # gtk (unmaintained)
    "RUSTSEC-2024-0416", # atk-sys (unmaintained)
    "RUSTSEC-2024-0418", # gdk-sys (unmaintained)
    "RUSTSEC-2024-0419", # gtk3-macros (unmaintained)
    "RUSTSEC-2024-0420", # gtk-sys (unmaintained)
    "RUSTSEC-2024-0370", # proc-macro-error (via glib-macros 0.18)

    # dioxus-desktop pulls image 0.25 with default features (AVIF)
    "RUSTSEC-2024-0436", # paste (unmaintained)

    # Strike48 SDK still uses tonic 0.12 → rustls-pemfile (Linux target only)
    "RUSTSEC-2025-0134", # rustls-pemfile (unmaintained)

    # wayland-scanner 0.31 pins quick-xml ^0.39 — build-time XML parser
    # for bundled Wayland protocol files, not runtime user input. Linux
    # desktop only; drops when wayland-scanner bumps quick-xml >=0.41.
    "RUSTSEC-2026-0194", # quick-xml (quadratic runtime — DoS)
    "RUSTSEC-2026-0195", # quick-xml (unbounded namespace alloc — DoS)
]
