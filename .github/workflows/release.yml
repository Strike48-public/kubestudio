name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build:
    name: Desktop (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: kubestudio-linux-x86_64
            name: Linux x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: kubestudio-darwin-x86_64
            name: macOS x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: kubestudio-darwin-aarch64
            name: macOS aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: kubestudio-windows-x86_64.exe
            name: Windows x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev libxdo-dev protobuf-compiler

      - name: Install protobuf (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc -y

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --features desktop

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/${{ matrix.target }}/release/kubestudio.exe dist/${{ matrix.artifact }}
          else
            cp target/${{ matrix.target }}/release/kubestudio dist/${{ matrix.artifact }}
          fi
          cd dist
          if command -v sha256sum &> /dev/null; then
            sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256
          else
            shasum -a 256 ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*

  build-connector:
    name: Connector (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: ks-connector-linux-x86_64
            name: Linux x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: ks-connector-darwin-x86_64
            name: macOS x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: ks-connector-darwin-aarch64
            name: macOS aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: ks-connector-windows-x86_64
            name: Windows x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install protobuf (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc -y

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: connector-${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin ks-connector --features connector --no-default-features -p ks-ui

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/${{ matrix.target }}/release/ks-connector.exe dist/
            cd dist && 7z a ${{ matrix.artifact }}.zip ks-connector.exe
          else
            cp target/${{ matrix.target }}/release/ks-connector dist/
            cd dist && tar -czvf ${{ matrix.artifact }}.tar.gz ks-connector
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.*

  release:
    name: Release
    needs: [build, build-connector, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: k*

      - name: Prepare assets
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          body: |
            ## KubeStudio ${{ github.ref_name }}

            ### Downloads

            #### Desktop (kubestudio)

            | Platform | Architecture | Download |
            |----------|--------------|----------|
            | macOS | Apple Silicon | `kubestudio-darwin-aarch64` |
            | macOS | Intel | `kubestudio-darwin-x86_64` |
            | Linux | x86_64 | `kubestudio-linux-x86_64` |
            | Windows | x86_64 | `kubestudio-windows-x86_64.exe` |

            After downloading on macOS/Linux, make executable: `chmod +x kubestudio-*`

            #### Connector (ks-connector)

            | Platform | Architecture | Download |
            |----------|--------------|----------|
            | macOS | Apple Silicon | `ks-connector-darwin-aarch64.tar.gz` |
            | macOS | Intel | `ks-connector-darwin-x86_64.tar.gz` |
            | Linux | x86_64 | `ks-connector-linux-x86_64.tar.gz` |
            | Windows | x86_64 | `ks-connector-windows-x86_64.zip` |

            ### Docker

            ```bash
            docker pull ${{ env.REGISTRY }}/${{ github.repository }}:${{ github.ref_name }}
            ```

            ### Helm

            ```bash
            helm install kubestudio chart/kubestudio \
              --set image.tag=${{ github.ref_name }}
            ```

            ### Checksums

            See individual `.sha256` files for checksums.
