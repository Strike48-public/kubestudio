name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      macos_signing:
        description: 'Enable macOS code signing & notarization (requires active Apple developer account)'
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  packages: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build:
    name: Desktop (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: kubestudio-linux-x86_64
            name: Linux x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: kubestudio-darwin-x86_64
            name: macOS x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: kubestudio-darwin-aarch64
            name: macOS aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: kubestudio-windows-x86_64.exe
            name: Windows x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev libxdo-dev protobuf-compiler

      - name: Install protobuf (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc -y

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --features desktop

      - name: Import Apple certificate
        if: runner.os == 'macOS' && inputs.macos_signing == true
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Decode certificate
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12

          # Create and configure temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          security import $RUNNER_TEMP/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db

      - name: Sign macOS binary
        if: runner.os == 'macOS' && inputs.macos_signing == true
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          codesign --force --options runtime \
            --entitlements entitlements.plist \
            --sign "Developer ID Application: Devo Inc. ($APPLE_TEAM_ID)" \
            target/${{ matrix.target }}/release/kubestudio

      - name: Notarize macOS binary
        if: runner.os == 'macOS' && inputs.macos_signing == true
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent target/${{ matrix.target }}/release/kubestudio $RUNNER_TEMP/kubestudio.zip
          for attempt in 1 2 3; do
            echo "Notarization attempt $attempt..."
            if xcrun notarytool submit $RUNNER_TEMP/kubestudio.zip \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait --timeout 30m; then
              echo "Notarization succeeded."
              break
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Notarization failed, retrying in 30s..."
              sleep 30
            else
              echo "Notarization failed after $attempt attempts."
              exit 1
            fi
          done

      - name: Sign Windows binary
        if: runner.os == 'Windows'
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE }}
          files-folder: target/${{ matrix.target }}/release
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/${{ matrix.target }}/release/kubestudio.exe dist/${{ matrix.artifact }}
          else
            cp target/${{ matrix.target }}/release/kubestudio dist/${{ matrix.artifact }}
          fi
          cd dist
          if command -v sha256sum &> /dev/null; then
            sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256
          else
            shasum -a 256 ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*

  build-connector:
    name: Connector (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: ks-connector-linux-x86_64
            name: Linux x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: ks-connector-darwin-x86_64
            name: macOS x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: ks-connector-darwin-aarch64
            name: macOS aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: ks-connector-windows-x86_64
            name: Windows x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install protobuf (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc -y

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: connector-${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin ks-connector --features connector --no-default-features -p ks-ui

      - name: Import Apple certificate
        if: runner.os == 'macOS' && inputs.macos_signing == true
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Decode certificate
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12

          # Create and configure temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          security import $RUNNER_TEMP/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db

      - name: Sign macOS binary
        if: runner.os == 'macOS' && inputs.macos_signing == true
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          codesign --force --options runtime \
            --entitlements entitlements.plist \
            --sign "Developer ID Application: Devo Inc. ($APPLE_TEAM_ID)" \
            target/${{ matrix.target }}/release/ks-connector

      - name: Notarize macOS binary
        if: runner.os == 'macOS' && inputs.macos_signing == true
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent target/${{ matrix.target }}/release/ks-connector $RUNNER_TEMP/ks-connector.zip
          for attempt in 1 2 3; do
            echo "Notarization attempt $attempt..."
            if xcrun notarytool submit $RUNNER_TEMP/ks-connector.zip \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait --timeout 30m; then
              echo "Notarization succeeded."
              break
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Notarization failed, retrying in 30s..."
              sleep 30
            else
              echo "Notarization failed after $attempt attempts."
              exit 1
            fi
          done

      - name: Sign Windows binary
        if: runner.os == 'Windows'
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE }}
          files-folder: target/${{ matrix.target }}/release
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/${{ matrix.target }}/release/ks-connector.exe dist/
            cd dist && 7z a ${{ matrix.artifact }}.zip ks-connector.exe
          else
            cp target/${{ matrix.target }}/release/ks-connector dist/
            cd dist && tar -czvf ${{ matrix.artifact }}.tar.gz ks-connector
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.*

  release:
    name: Release
    needs: [build, build-connector, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: k*

      - name: Prepare assets
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          body: |
            ## KubeStudio ${{ github.ref_name }}

            ### Downloads

            #### Desktop (kubestudio)

            | Platform | Architecture | Download |
            |----------|--------------|----------|
            | macOS | Apple Silicon | `kubestudio-darwin-aarch64` |
            | macOS | Intel | `kubestudio-darwin-x86_64` |
            | Linux | x86_64 | `kubestudio-linux-x86_64` |
            | Windows | x86_64 | `kubestudio-windows-x86_64.exe` |

            After downloading on macOS/Linux, make executable: `chmod +x kubestudio-*`

            #### Connector (ks-connector)

            | Platform | Architecture | Download |
            |----------|--------------|----------|
            | macOS | Apple Silicon | `ks-connector-darwin-aarch64.tar.gz` |
            | macOS | Intel | `ks-connector-darwin-x86_64.tar.gz` |
            | Linux | x86_64 | `ks-connector-linux-x86_64.tar.gz` |
            | Windows | x86_64 | `ks-connector-windows-x86_64.zip` |

            ### Docker

            ```bash
            docker pull ${{ env.REGISTRY }}/${{ github.repository }}:${{ github.ref_name }}
            ```

            ### Helm

            ```bash
            helm install kubestudio chart/kubestudio \
              --set image.tag=${{ github.ref_name }}
            ```

            ### Checksums

            See individual `.sha256` files for checksums.
